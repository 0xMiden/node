syntax = "proto3";
package note;

import "types/primitives.proto";
import "types/account.proto";

// NOTES
// ================================================================================================

// The type of a note.
enum NoteType {
    // Unspecified note type (default value, should not be used).
    NOTE_TYPE_UNSPECIFIED = 0;
    // Public note - details are visible on-chain.
    NOTE_TYPE_PUBLIC = 1;
    // Private note - details are not visible on-chain.
    NOTE_TYPE_PRIVATE = 2;
}

// Represents a note's ID.
message NoteId {
    // A unique identifier of the note which is a 32-byte commitment to the underlying note data.
    primitives.Digest id = 1;
}

// List of note IDs.
message NoteIdList {
    // List of note IDs to be queried from the database.
    repeated NoteId ids = 1;
}

// Represents a note's metadata.
//
// Mirrors the protocol-level `miden_protocol::note::NoteMetadata`: it carries the partial metadata
// (sender, note type, tag), the per-slot attachment schemes, and the commitment over the note's
// attachments. The full attachment contents (when present) are carried separately on `Note` /
// `NetworkNote`.
message NoteMetadata {
    // The account which sent the note.
    account.AccountId sender = 1;

    // The type of the note.
    NoteType note_type = 2;

    // A value which can be used by the recipient(s) to identify notes intended for them.
    //
    // See `miden_protocol::note::note_tag` for more info.
    fixed32 tag = 3;

    // The attachment scheme of each attachment slot.
    //
    // The protocol allows up to `NoteAttachments::MAX_COUNT` attachments per note. Each slot carries
    // either a scheme value in `1..=65534` or `0` to indicate that the slot is absent. Trailing
    // absent slots may be omitted, so a note with no attachments has an empty list.
    //
    // See `miden_protocol::note::NoteAttachmentHeader` for more info.
    repeated fixed32 attachment_schemes = 4;

    // Commitment over the note's attachments.
    //
    // See `miden_protocol::note::NoteAttachments::to_commitment` for more info.
    primitives.Digest attachments_commitment = 5;
}

// Represents a note.
//
// The note is composed of the note metadata, its serialized details, and serialized attachments.
message Note {
    // The note's metadata.
    NoteMetadata metadata = 1;

    // Serialized note details (empty for private notes).
    optional bytes details = 2;

    // Serialized `miden_protocol::note::NoteAttachments`. Empty bytes encode an empty collection.
    bytes attachments = 3;
}

// Represents a network note.
//
// Network notes are a subtype of public notes, and as such, their details are always publicly
// known.
message NetworkNote {
    // The note's metadata.
    NoteMetadata metadata = 1;

    // Serialized note details (i.e., assets and recipient).
    bytes details = 2;

    // Serialized `miden_protocol::note::NoteAttachments`. Empty bytes encode an empty collection.
    bytes attachments = 3;
}

// Represents a committed note.
//
// A committed note is a note that has been included in a block.
message CommittedNote {
    // Either private, public, or network note.
    Note note = 1;

    // The data needed to prove that the note is present in the chain.
    NoteInclusionInBlockProof inclusion_proof = 2;
}

// Represents the result of getting committed notes.
message CommittedNoteList {
    // List of committed notes.
    repeated CommittedNote notes = 1;
}

// Represents a proof of note's inclusion in a block.
//
// Does not include proof of the block's inclusion in the chain.
message NoteInclusionInBlockProof {
    // A unique identifier of the note which is a 32-byte commitment to the underlying note data.
    NoteId note_id = 1;

    // The block number in which the note was created.
    fixed32 block_num = 2;

    // The index of the note in the block.
    uint32 note_index_in_block = 3;

    // The note's inclusion proof in the block.
    primitives.SparseMerklePath inclusion_path = 4;
}

// Represents a note's metadata together with proof of inclusion in a block.
//
// To get the full note (including attachment contents), use `GetNotesById`.
message NoteSyncRecord {
    // The metadata of the note.
    NoteMetadata metadata = 1;

    // Proof of the note's inclusion in a block.
    NoteInclusionInBlockProof inclusion_proof = 2;
}

// Represents a note header.
//
// A note header consists of a commitment to the note's details and its metadata.
message NoteHeader {
    // Commitment to the note's details (recipient + assets), excluding metadata.
    primitives.Digest details_commitment = 1;

    // The note's metadata.
    NoteMetadata metadata = 2;
}

// Represents a commitment to a note script.
message NoteScriptRoot {
    // Root of the note script.
    primitives.Digest root = 1;
}

// Represents a note script.
message NoteScript {
    // Entrypoint of the script.
    uint32 entrypoint = 1;
    // MAST of the script.
    bytes mast = 2;
}
