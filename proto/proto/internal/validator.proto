// Specification of the user facing gRPC API.
syntax = "proto3";
package validator;

import "types/transaction.proto";
import "types/blockchain.proto";
import "types/primitives.proto";
import "google/protobuf/empty.proto";

// VALIDATOR API
// ================================================================================================

// Validator API for the Validator component.
service Api {
   // Returns the status info of the validator.
   rpc Status(google.protobuf.Empty) returns (ValidatorStatus) {}

   // Submits a transaction to the validator.
   rpc SubmitProvenTransaction(transaction.ProvenTransaction) returns (google.protobuf.Empty) {}

   // Validates and signs a proposed block, returning the signature and the signed block commitment.
   rpc SignBlock(blockchain.ProposedBlock) returns (blockchain.SignBlockResponse) {}
}

// VALIDATOR STATUS
// ================================================================================================

// Represents the status of the validator.
message ValidatorStatus {
    // The validator's running version.
    string version = 1;

    // The validator's status.
    string status = 2;

    // The validator's current chain tip (highest signed block number).
    fixed32 chain_tip = 3;

    // The total number of transactions validated by this validator.
    fixed64 validated_transactions_count = 4;

    // The total number of blocks signed by this validator.
    fixed64 signed_blocks_count = 5;
}
