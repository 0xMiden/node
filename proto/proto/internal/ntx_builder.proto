// Internal gRPC API for the network transaction builder component.
syntax = "proto3";
package ntx_builder;

import "types/note.proto";

// NTX BUILDER API
// ================================================================================================

// API for querying network transaction builder state.
service Api {
    // Returns the latest execution error for a network note, if any.
    //
    // This is useful for debugging notes that are failing to be consumed by
    // the network transaction builder.
    rpc GetNoteError(note.NoteId) returns (GetNoteErrorResponse) {}
}

// GET NOTE ERROR
// ================================================================================================

// Response containing the latest execution error for a network note.
message GetNoteErrorResponse {
    // The latest error message, if any.
    optional string error = 1;
    // Number of failed execution attempts.
    uint32 attempt_count = 2;
    // Block number of the last failed attempt, if any.
    optional fixed32 last_attempt_block_num = 3;
}
