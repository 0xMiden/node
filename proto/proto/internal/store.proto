// Unified specification of the internal store gRPC APIs.
syntax = "proto3";
package store;

import "google/protobuf/empty.proto";
import "types/account.proto";
import "types/blockchain.proto";
import "types/note.proto";
import "rpc.proto";

// RPC STORE API
// ================================================================================================

// Store API for the RPC component
service Rpc {
    // Returns the status info.
    rpc Status(google.protobuf.Empty) returns (rpc.StoreStatus) {}

    // Returns the latest details the specified account.
    rpc GetAccount(rpc.AccountRequest) returns (rpc.AccountResponse) {}

    // Filters the provided account ids down to the subset that are currently
    // classified as network accounts. Ids that don't exist in the store, or that
    // aren't network accounts, are omitted. The order of the returned ids is
    // unspecified.
    //
    // Callers checking a single id should pass a one-element list and check whether
    // the response is non-empty.
    rpc FilterNetworkAccounts(account.AccountIdList) returns (account.AccountIdList) {}

    // Returns raw block data for the specified block number, optionally including the block proof.
    rpc GetBlockByNumber(blockchain.BlockRequest) returns (blockchain.MaybeBlock) {}

    // Retrieves block header by given block number. Optionally, it also returns the MMR path
    // and current chain length to authenticate the block's inclusion.
    rpc GetBlockHeaderByNumber(rpc.BlockHeaderByNumberRequest) returns (rpc.BlockHeaderByNumberResponse) {}

    // Returns a list of committed notes matching the provided note IDs.
    rpc GetNotesById(note.NoteIdList) returns (note.CommittedNoteList) {}

    // Returns the script for a note by its root.
    rpc GetNoteScriptByRoot(note.NoteScriptRoot) returns (rpc.MaybeNoteScript) {}

    // Returns a list of nullifiers that match the specified prefixes and are recorded in the node.
    //
    // Note that only 16-bit prefixes are supported at this time.
    rpc SyncNullifiers(rpc.SyncNullifiersRequest) returns (rpc.SyncNullifiersResponse) {}

    // Returns blocks containing notes matching the requested tags within the given range.
    //
    // The response batches as many blocks as fit within the response payload limit.
    rpc SyncNotes(rpc.SyncNotesRequest) returns (rpc.SyncNotesResponse) {}

    // Returns chain MMR updates within a block range.
    rpc SyncChainMmr(rpc.SyncChainMmrRequest) returns (rpc.SyncChainMmrResponse) {}

    // Returns account vault updates for specified account within a block range.
    rpc SyncAccountVault(rpc.SyncAccountVaultRequest) returns (rpc.SyncAccountVaultResponse) {}

    // Returns storage map updates for specified account and storage slots within a block range.
    rpc SyncAccountStorageMaps(rpc.SyncAccountStorageMapsRequest) returns (rpc.SyncAccountStorageMapsResponse) {}

    // Returns transactions records for specific accounts within a block range.
    rpc SyncTransactions(rpc.SyncTransactionsRequest) returns (rpc.SyncTransactionsResponse) {}

    // Streams committed blocks starting from the given block number (inclusive).
    //
    // Replays historical blocks first, then streams live blocks as they are committed.
    // On lag (replica falls too far behind), the stream is closed with a DATA_LOSS error and
    // the client should reconnect from its local tip.
    rpc BlockSubscription(rpc.BlockSubscriptionRequest) returns (stream rpc.BlockSubscriptionResponse) {}

    // Streams block proofs starting from the given block number (inclusive).
    //
    // Replays existing proofs first, then streams new proofs as they are generated.
    // On lag, the stream is closed with a DATA_LOSS error.
    rpc ProofSubscription(rpc.ProofSubscriptionRequest) returns (stream rpc.ProofSubscriptionResponse) {}
}
