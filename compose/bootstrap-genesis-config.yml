# Optional override for bootstrapping the validator from a host genesis config file.
#
# Usage:
#   MIDEN_GENESIS_CONFIG_FILE=/absolute/path/to/genesis.toml \
#     make local-network-up-with-custom-genesis-config
#
# The file is mounted at a fixed in-container path so the bootstrap command never
# receives a host path.

services:
  bootstrap-validator:
    volumes:
      - type: bind
        source: ${MIDEN_GENESIS_CONFIG_FILE:?Set MIDEN_GENESIS_CONFIG_FILE to the genesis config file path}
        target: /genesis.toml
        read_only: true
    environment:
      MIDEN_NODE_VALIDATOR_USE_GENESIS_CONFIG: "1"
