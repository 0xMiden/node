apiVersion: 1

groups:
  - orgId: 1
    name: miden-node
    folder: Miden
    interval: 1m
    rules:
      - uid: miden-high-error-rate
        title: High span error rate
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        isPaused: false
        annotations:
          summary: "Span error rate above 1% for 5m (service: {{ $labels.service_name }})"
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: sum by (service_name) (rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m])) / clamp_min(sum by (service_name) (rate(traces_spanmetrics_calls_total[5m])), 1e-9)
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.01] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  type: query

      - uid: miden-block-build-p99-slow
        title: Block build p99 latency regression
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        isPaused: false
        annotations:
          summary: "p99 latency > 2s on a block_builder.* span for 5m"
        labels:
          severity: warning
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: histogram_quantile(0.99, sum by (le, span_name) (rate(traces_spanmetrics_latency_bucket{span_name=~"block_builder.*"}[5m])))
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [2] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  type: query

      - uid: miden-traffic-flatlined
        title: Span traffic flatlined
        condition: C
        for: 2m
        noDataState: Alerting
        execErrState: Error
        isPaused: false
        annotations:
          summary: "No spans ingested for 2m — collector, tempo, or the node may be down"
        labels:
          severity: critical
        data:
          - refId: A
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              editorMode: code
              instant: true
              expr: sum(rate(traces_spanmetrics_calls_total[2m]))
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [0.01] }
                  operator: { type: and }
                  query: { params: [C] }
                  reducer: { type: last, params: [] }
                  type: query
