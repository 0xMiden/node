services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.150.1
    volumes:
      - ./compose/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - tempo
      - prometheus
