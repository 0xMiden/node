# Runs changelog related jobs.
# CI job heavily inspired by: https://github.com/tarides/changelog-check-action

name: changelog

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

env:
  SAVE_CACHE: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  changelog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Rustup
        run: rustup toolchain install --no-self-update
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: changelog
          save-if: ${{ env.SAVE_CACHE }}
      - name: Verify changelog metadata
        run: |
          set -euo pipefail

          jq -r '.pull_request.body // ""' "${GITHUB_EVENT_PATH}" > "${RUNNER_TEMP}/pr-body.md"
          cargo xtask changelog verify --pr-body-file "${RUNNER_TEMP}/pr-body.md"
        shell: bash
