# Runs changelog related jobs.
# CI job heavily inspired by: https://github.com/tarides/changelog-check-action

name: changelog

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  changelog:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify changelog metadata
        run: |
          set -euo pipefail

          jq -r '.pull_request.body // ""' "${GITHUB_EVENT_PATH}" > "${RUNNER_TEMP}/pr-body.md"
          cargo xtask changelog verify --pr-body-file "${RUNNER_TEMP}/pr-body.md"
        shell: bash
